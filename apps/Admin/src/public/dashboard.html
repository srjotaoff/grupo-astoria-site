<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Administrativo</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .dashboard-card {
        max-width: 560px;
        text-align: center;
      }
      .badge {
        display: inline-block;
        background: #f0f4ff;
        color: #3b5bdb;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 4px 12px;
        border-radius: 999px;
        margin-bottom: 1.25rem;
      }
      .welcome {
        font-size: 1.6rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }
      .desc {
        color: #555;
        margin-bottom: 2rem;
        line-height: 1.6;
      }
      .construction {
        background: #fffbe6;
        border: 1px solid #ffe066;
        border-radius: 10px;
        padding: 1.25rem 1.5rem;
        color: #7a5900;
        font-size: 0.95rem;
        margin-bottom: 2rem;
        text-align: left;
      }
      .construction strong {
        display: block;
        margin-bottom: 0.35rem;
        font-size: 1rem;
      }
      .user-info {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 0.9rem 1.25rem;
        font-size: 0.88rem;
        color: #444;
        text-align: left;
        margin-bottom: 1.75rem;
      }
      .user-info span {
        font-weight: 600;
        color: #222;
      }
      .logout-btn {
        width: 100%;
        padding: 0.75rem;
        background: #e03131;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      .logout-btn:hover {
        background: #c92a2a;
      }
      #status-msg {
        margin-top: 1rem;
        font-size: 0.85rem;
        color: #888;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <main class="card dashboard-card">
      <span class="badge">Painel Administrativo</span>
      <p class="welcome">Bem-vindo ao Grupo Astória 👋</p>
      <p class="desc">Você está autenticado com sucesso.</p>

      <div class="construction">
        <strong>🚧 Em Desenvolvimento</strong>
        Esta é a área administrativa do Grupo Astória. As funcionalidades do painel
        serão implementadas em breve. Fique ligado!
      </div>

      <div class="user-info" id="user-info">
        Carregando informações do usuário...
      </div>

      <button class="logout-btn" id="logout-btn" type="button">Encerrar Sessão</button>
      <p id="status-msg"></p>
    </main>

    <script src="/dashboard.js" defer></script>
  </body>
</html>
